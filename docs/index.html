<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoPostApp Legal</title>
  <style>
    :root {
      --bg: #f7f5ef;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --accent-hover: #115e59;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top right, #e0f2f1, transparent 45%), var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 3vw, 2rem);
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .links {
      margin-top: 22px;
      display: grid;
      gap: 12px;
    }

    .link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      color: #ffffff;
      background: var(--accent);
      border-radius: 10px;
      padding: 14px 16px;
      font-weight: 600;
      transition: background-color 0.2s ease;
    }

    .link:hover,
    .link:focus-visible {
      background: var(--accent-hover);
      outline: none;
    }

    .note {
      margin-top: 16px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>AutoPostApp Legal Pages</h1>
    <p>Welcome to the AutoPostApp legal center. Choose a document below to review our current policies.</p>

    <div class="links">
      <a class="link" href="privacy-policy.html">Read Privacy Policy <span aria-hidden="true">&rarr;</span></a>
      <a class="link" href="terms-of-service.html">Read Terms of Service <span aria-hidden="true">&rarr;</span></a>
    </div>

    <p class="note">Last updated: April 8, 2026</p>
  </main>
</body>
</html>
